name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo. The release workflow holds the
# write/id-token scopes it needs; PRs (incl. forks) never get write access.
permissions:
  contents: read

jobs:
  # Core verification pipeline — runs on every push and PR (including forks).
  # No secrets needed; this is the gate that proves types/tests/build are green.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  # Live round-trip against the real Yext API. Runs only on pushes to main
  # (GitHub does not expose secrets to PRs from forks). The test self-skips if
  # no credential secret is configured, so this job is green until you add one.
  integration:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration
        env:
          # Add ONE of these as a repository secret (Settings -> Secrets and
          # variables -> Actions). Encrypted at rest, masked in logs, never
          # exposed to fork PRs.
          YEXT_API_KEY: ${{ secrets.YEXT_API_KEY }}
          YEXT_ACCESS_TOKEN: ${{ secrets.YEXT_ACCESS_TOKEN }}
          # Optional non-secret config (Settings -> Variables).
          YEXT_API_VERSION: ${{ vars.YEXT_API_VERSION }}
          YEXT_ACCOUNT_ID: ${{ vars.YEXT_ACCOUNT_ID }}
